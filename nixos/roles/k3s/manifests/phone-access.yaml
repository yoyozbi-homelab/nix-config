apiVersion: v1
kind: ServiceAccount
metadata:
  name: phone-access
  namespace: kube-system
---
# Long-lived token for use in phone apps
apiVersion: v1
kind: Secret
metadata:
  name: phone-access-token
  namespace: kube-system
  annotations:
    kubernetes.io/service-account.name: phone-access
type: kubernetes.io/service-account-token
---
# Read-only access to all resources cluster-wide
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: phone-access-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: phone-access
    namespace: kube-system
---
# Extra permissions: delete pods (restart) and patch workloads (rolling restart)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: phone-access-pod-manager
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: phone-access-pod-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: phone-access-pod-manager
subjects:
  - kind: ServiceAccount
    name: phone-access
    namespace: kube-system
